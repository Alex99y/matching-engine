name: UI

on:
  push:
    branches: ["master"]
    paths:
      - "ui/**"
      - "ts-sdk/src/**"
  pull_request:
    branches: ["master"]
    paths:
      - "ui/**"
      - "ts-sdk/src/**"

defaults:
  run:
    working-directory: ui

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Matches ts-sdk's minimum (bigint JSON reviver needs Node >= 21.7);
          # ui imports ts-sdk straight from source, so the same floor applies.
          node-version: "22.x"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
