version: '3.8'

services:
  api:
    image: us-central1-docker.pkg.dev/e5d919ff-a78f-43b8-856/me-docker-registry/api:latest
    container_name: api-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - METRICS_PORT=9091
      - DEBUG_LEVEL=debug
      # These variables will be read from the .env file generated by the script:
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRESQL_URL=${POSTGRESQL_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}